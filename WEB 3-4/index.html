<!DOCTYPE html>
<html>
<head>
    <title>Just Games, Like Games</title>
    <meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="normalize.css">
</head>
    <body>
        <div class="centering">
            <h1>Games and Fames</h1>
        </div>
        <div class="wrapper">
            <div class="accordion">
                <div class="container">
                    <div class="content">
                        <form>
                            <input type="radio" id="record1" name="options" value="record1" checked>
                            <label for="record1" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">CS2 - We always come back</h1>
                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/cs2.jpg" />
                                    </div>
                                </div>
                            </label>
                            
                            <input type="radio" id="option2" name="options" value="option2">
                            <label for="option2" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">Dota 2 - we know your family</h1>
                                    <div class="item_icon">
                                        <a href=''><img src="img/plus.svg" alt="plus" class="plus-icon"/></a>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/dota2.jpg" />
                                    </div>
                                </div>
                            </label>

                            <input type="radio" id="option3" name="options" value="option3">
                            <label for="option3" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">Rust - Sleep?, what is it?</h1>
                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/rust.jpg" />
                                    </div>
                                </div>
                            </label>

                            <input type="radio" id="option4" name="options" value="option4">
                            <label for="option4" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">Roblox - so... many kids</h1>
                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/roblox.jpg" />
                                    </div>
                                </div>
                            </label>
                            <input type="radio" id="option5" name="options" value="option5">
                            <label for="option5" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">The Witcher 3 - Gerald, monster slayer</h1>
                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/thewitcher3.jpg" />
                                    </div>
                                </div>
                            </label>
                            <input type="radio" id="option6" name="options" value="option6">
                            <label for="option6" class="accordion-item">
                                <div class="item_top">
                                    <h1 class="item_title">Cyberpunk 2077 - pih. pif. and future is here</h1>
                                    <div class="item_icon">
                                        <img src="img/plus.svg" alt="plus" class="plus-icon"/>
                                    </div>
                                </div>
                                
                                <div class="box">
                                    <div class="item_image">
                                        <img src="img/cyberpunk2077.jpg" />
                                    </div>
                                </div>
                            </label>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
